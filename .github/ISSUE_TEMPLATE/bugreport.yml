name: Bug Report
description: Report a bug
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce it?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
